bundle:
  name: bank_lakehouse_etl

workspace:
  host: https://dbc-61ceb8ef-9f41.cloud.databricks.com

resources:
  jobs:
    bank_lakehouse_etl_pipeline:
      name: bank_lakehouse_etl_pipeline

      tags:
        project: bank_lakehouse_etl
        layer: medallion

      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 1
            data_security_mode: "SINGLE_USER"

      parameters:
        - name: batch_id
          default: "1"

      tasks:
        - task_key: setup_infra
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: notebooks/00_setup_catalog_schema_volumes.py

        - task_key: generate_synthetic_data
          job_cluster_key: main_cluster
          depends_on:
            - task_key: setup_infra
          notebook_task:
            notebook_path: data_generator/generate_synthetic_data.py
            base_parameters:
              batch_id: "{{job.parameters.batch_id}}"

        - task_key: bronze_ingest
          job_cluster_key: main_cluster
          depends_on:
            - task_key: generate_synthetic_data
          notebook_task:
            notebook_path: notebooks/01_bronze_ingest_incremental.py

        - task_key: silver_transform
          job_cluster_key: main_cluster
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: notebooks/02_silver_transform.py

        - task_key: gold_aggregate
          job_cluster_key: main_cluster
          depends_on:
            - task_key: silver_transform
          notebook_task:
            notebook_path: notebooks/03_gold_aggregate.py

        - task_key: data_quality_checks
          job_cluster_key: main_cluster
          depends_on:
            - task_key: gold_aggregate
          notebook_task:
            notebook_path: notebooks/04_data_quality_checks.py

        - task_key: analytics_queries
          job_cluster_key: main_cluster
          depends_on:
            - task_key: data_quality_checks
          notebook_task:
            notebook_path: notebooks/05_analytics_queries.py